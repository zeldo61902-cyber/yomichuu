<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gaegu&display=swap'); /* 귀여운 폰트 */

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
        }

        .wish-card {
            background: linear-gradient(135deg, #FFF9E6, #E0F7FA, #FFEBD6); /* 크림+민트+주황 그라데이션 */
            border-radius: 25px;
            padding: 20px 30px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            font-family: 'Gaegu', cursive;
            position: relative;
            overflow: hidden;
            width: 250px;
        }

        .d-day-text { font-size: 18px; color: #78909C; margin-bottom: 5px; }
        .days-count { font-size: 40px; color: #546E7A; font-weight: bold; margin: 10px 0; }
        
        /* 반짝이는 별 효과 */
        .star { position: absolute; font-size: 15px; animation: sparkle 1.5s infinite; }
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

<div class="wish-card">
    <div class="star" style="top: 10px; left: 15px;">✧</div>
    <div class="star" style="bottom: 10px; right: 15px;">🎀</div>
    <div class="d-day-text">우리 함께한 지</div>
    <div class="days-count" id="days">0</div>
    <div class="d-day-text">일째 되는 날 ⋆.˚</div>
</div>

<script>
    const startDate = new Date('2023-09-04');
    const today = new Date();
    const diffTime = Math.abs(today - startDate);
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
    document.getElementById('days').innerText = diffDays;
</script>

</body>
</html>
